  "chicken":"grilled chicken plate","steak":"grilled steak dinner","salmon":"baked salmon fillet","shrimp":"cooked shrimp plate",
  "lamb":"lamb chops plate","pork":"pork chops dinner","tofu":"crispy tofu bowl","tuna":"tuna steak plate","turkey":"roasted turkey",
  "beef":"beef stir fry","duck":"roasted duck","halibut":"pan seared halibut","cod":"baked cod fish","tilapia":"pan fried tilapia",
  "trout":"grilled trout","scallops":"seared scallops plate","swordfish":"grilled swordfish",
  "pasta":"pasta dish plate","carbonara":"spaghetti carbonara","spaghetti":"spaghetti plate","penne":"penne pasta dish",
  "linguine":"linguine pasta","ziti":"baked ziti casserole","gnocchi":"gnocchi dish","tortellini":"tortellini plate",
  "orzo":"orzo pasta bowl","ravioli":"ravioli plate",
  "tacos":"tacos plate","taco":"tacos plate","burrito":"burrito plate","quesadilla":"cheese quesadilla",
  "fajitas":"chicken fajitas sizzling","enchiladas":"enchiladas plate","nachos":"loaded nachos",
  "pizza":"pizza margherita","risotto":"mushroom risotto bowl","curry":"curry rice bowl","stir-fry":"vegetable stir fry",
  "stir fry":"vegetable stir fry","soup":"bowl of soup","stew":"beef stew bowl","chili":"bowl of chili",
  "salad":"fresh salad bowl","wrap":"chicken wrap","sandwich":"deli sandwich","burger":"hamburger",
  "bowl":"grain bowl food","noodles":"asian noodles bowl","pad thai":"pad thai noodles",
  "pancakes":"stack of pancakes","french toast":"french toast breakfast","omelette":"omelette breakfast plate",
  "oats":"overnight oats jar","smoothie":"smoothie bowl","acai":"acai bowl","toast":"avocado toast plate",
  "fried rice":"fried rice plate","poke":"poke bowl","gyro":"gyro plate","shakshuka":"shakshuka eggs",
  "meatballs":"meatballs marinara","risotto":"creamy risotto","mac cheese":"mac and cheese bowl",
  "stuffed":"stuffed peppers plate","lentil":"lentil soup bowl","minestrone":"minestrone soup bowl",
  "pulled pork":"pulled pork sandwich","sweet potato":"loaded sweet potato",
  "cauliflower":"roasted cauliflower dish","brussels":"roasted brussels sprouts","eggplant":"roasted eggplant",
  "chickpea":"chickpea curry bowl","quinoa":"quinoa salad bowl",
  "skewers":"meat skewers grilled","sliders":"mini burger sliders","bites":"appetizer bites plate",
  "rolls":"fresh spring rolls","gazpacho":"gazpacho soup","ceviche":"ceviche dish",
  "ribs":"bbq ribs plate","brisket":"smoked brisket","wings":"chicken wings plate",
  "masala":"chicken tikka masala","tikka":"chicken tikka masala",
};
function searchQuery(name){
  var lo=name.toLowerCase();
  // Try to find a matching dish type
  var keys=Object.keys(DISH_MAP);
  for(var i=0;i<keys.length;i++){
    if(lo.indexOf(keys[i])!==-1)return DISH_MAP[keys[i]];
  }
  // Fallback: use first 2 meaningful words + "plated dish"
  var words=name.split(/\s+/).filter(function(w){
    return w.length>2 && ["with","and","the","style","classic"].indexOf(w.toLowerCase())===-1;
  });
  return words.slice(0,2).join(" ")+" plated food dish";
}

var fetchQueue=[];
var fetching=false;
function processQueue(){
  if(fetching||fetchQueue.length===0)return;
  fetching=true;
  var item=fetchQueue.shift();
  fetch("https://api.pexels.com/v1/search?query="+encodeURIComponent(item.q)+"&per_page=1&orientation=landscape",{
    headers:{"Authorization":PEXELS_KEY}
  }).then(function(r){return r.json();}).then(function(data){
    if(data.photos&&data.photos.length>0){
      var photo=data.photos[0];
      var result={url:photo.src.medium,thumb:photo.src.small,photographer:photo.photographer};
      imgMemCache[item.q]=result;
      saveImgCache();
      item.resolve(result);
    }else{item.resolve(null);}
  }).catch(function(err){console.log("PantrySpark img error:",err);item.resolve(null);}).finally(function(){
    fetching=false;
    setTimeout(processQueue,200);
  });
}
function fetchFoodImage(recipeName){
  var q=searchQuery(recipeName);
  if(imgMemCache[q])return Promise.resolve(imgMemCache[q]);
  return new Promise(function(resolve){
    fetchQueue.push({q:q,resolve:resolve});
    processQueue();
  });
}

function useRecipeImage(recipeName,hasCustomPhoto){
  const[img,setImg]=useState(function(){
    if(hasCustomPhoto)return null;
    var q=searchQuery(recipeName);
    return imgMemCache[q]||null;
  });
  useEffect(function(){
    if(hasCustomPhoto)return;
    if(img)return;
    var cancelled=false;
    fetchFoodImage(recipeName).then(function(r){
      if(!cancelled&&r)setImg(r);
    });
    return function(){cancelled=true;};
  },[recipeName,hasCustomPhoto]);
  return img;
}

// ─── DONUT CHART COMPONENT ──────────────────────────────────────────────
function DonutChart({value,max,size=120,strokeWidth=10,color,label,sublabel}){
  const T=useT();const r=(size-strokeWidth)/2;const circ=2*Math.PI*r;const pct=Math.min(value/max,1);const offset=circ*(1-pct);
  return(<div style={{textAlign:"center"}}><svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.ringTrack} strokeWidth={strokeWidth}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={strokeWidth} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.6s ease"}}/></svg><div style={{marginTop:-size/2-8,position:"relative",height:size/2+8}}><div style={{fontSize:20,fontWeight:700,color:T.silverBright}}>{value}</div><div style={{fontSize:10,color:T.silverMuted}}>/ {max}</div></div><div style={{fontSize:12,fontWeight:600,color:T.silver,marginTop:4}}>{label}</div>{sublabel&&<div style={{fontSize:10,color:T.silverMuted}}>{sublabel}</div>}</div>);
}

// ─── MACRO BAR ──────────────────────────────────────────────────────────
function MacroBar({label,value,max,color,unit="g"}){
  const T=useT();const pct=Math.min((value/max)*100,100);
  return(<div style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3,color:T.silverMuted}}><span>{label}</span><span style={{fontWeight:600,color:pct>90?color:T.silverMuted}}>{value}{unit} / {max}{unit}</span></div><div style={{height:6,background:T.ringTrack,borderRadius:3,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:3,transition:"width 0.5s ease"}}/></div></div>);
}

// ─── WEEKLY BAR CHART ───────────────────────────────────────────────────
function WeeklyBarChart({data,max,color,label}){
  const T=useT();const days=["M","T","W","T","F","S","S"];
  return(<div style={{background:T.surface,borderRadius:12,padding:16,border:`1px solid ${T.border}`}}><div style={{fontSize:13,fontWeight:600,color:T.silverBright,marginBottom:12}}>{label}</div><div style={{display:"flex",gap:6,alignItems:"flex-end",height:80}}>{data.map((v,i)=>{const h=Math.max((v/max)*70,2);return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><div style={{fontSize:9,color:T.silverMuted,fontWeight:600}}>{v||""}</div><div style={{width:"100%",height:h,background:v>0?color:T.ringTrack,borderRadius:4,transition:"height 0.4s ease"}}/><div style={{fontSize:10,color:T.silverMuted}}>{days[i]}</div></div>);})}</div></div>);
}

// ─── RECIPE CARD (with calories + nutrition score + Unsplash images) ─────

  const imgUrl=recipe.photo||pxImg&&pxImg.url||null;
  const hasImg=!!imgUrl;
  const sv=servingOverride||recipe.servings;
  const scaledCal=Math.round(recipe.cal*(sv/recipe.servings));
  const ns=nutritionScore(recipe.cal,recipe.protein,recipe.carbs,recipe.fat);
  const[imgError,setImgError]=useState(false);
  const showImg=hasImg&&!imgError;
  return(<div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} onClick={()=>!locked&&onOpen(recipe)} style={{background:selected?T.accent1Bg:h?T.surfaceHover:T.surface,border:selected?`2px solid ${T.accent1}`:`1px solid ${T.border}`,borderRadius:14,overflow:"hidden",cursor:locked?"not-allowed":"pointer",transition:"all 0.2s",position:"relative",transform:h&&!locked?"translateY(-2px)":"none",boxShadow:h&&!locked?T.cardShadowHover:T.cardShadow,opacity:locked?0.6:1}}>

      {pxImg&&!recipe.photo&&<div style={{position:"absolute",bottom:4,left:8,fontSize:8,color:"rgba(255,255,255,0.7)"}}>Pexels</div>}
    </div>):(<div style={{width:"100%",height:60,background:T.surfaceAlt,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>{recipe.img||"🍽️"}</div>)}

    {locked&&<div style={{position:"absolute",top:8,right:8,zIndex:2}}><PremiumBadge/></div>}
    {recipe.isCustom&&<div style={{position:"absolute",top:8,left:8,zIndex:2}}><span style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:"rgba(0,0,0,0.5)",color:"#fff",fontWeight:600}}>MY RECIPE</span></div>}

      <div style={{fontWeight:600,fontSize:13,color:T.text,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{recipe.name}</div>
      <div style={{display:"flex",gap:6,fontSize:11,color:T.silverMuted,marginBottom:4,flexWrap:"wrap",alignItems:"center"}}>
        <span>⏱{recipe.time}m</span>
        <span style={{fontWeight:700,color:T.gold}}>🔥{scaledCal} cal</span>
        <span>💪{recipe.protein}g</span>
        <span>👥{sv}</span>
        <span style={{fontWeight:700,color:ns.color,fontSize:10,padding:"1px 5px",borderRadius:6,background:`${ns.color}18`}}>{ns.grade}</span>
      </div>

// ─── AI PHOTO SCANNER ───────────────────────────────────────────────────
function AIPhotoScanner({mode,onResult,onClose}){
  const T=useT();const[photo,setPhoto]=useState(null);const[loading,setLoading]=useState(false);const[result,setResult]=useState(null);const[error,setError]=useState(null);const fileRef=useRef(null);
  const handlePhoto=(e)=>{const file=e.target.files&&e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>setPhoto(ev.target.result);reader.readAsDataURL(file);};
  const analyze=async()=>{if(!photo)return;setLoading(true);setError(null);
    const prompt=mode==="calories"
      ?"Analyze this food photo. Estimate the calories, protein (g), carbs (g), and fat (g). Respond ONLY with a JSON object like: {\"name\":\"food name\",\"calories\":000,\"protein\":00,\"carbs\":00,\"fat\":00,\"confidence\":\"high/medium/low\"}"
      :"Extract the recipe from this photo. Include name, ingredients with amounts, prep time, servings, and estimated nutrition. Respond ONLY with JSON like: {\"name\":\"Recipe Name\",\"time\":30,\"servings\":4,\"calories\":400,\"protein\":20,\"carbs\":30,\"fat\":15,\"tags\":[\"dinner\"],\"ingredients\":[{\"name\":\"ingredient\",\"amount\":1,\"unit\":\"cup\",\"category\":\"Produce\"}]}";
    try{
      const base64=photo.split(",")[1];const mediaType=photo.split(";")[0].split(":")[1];
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mediaType,data:base64}},{type:"text",text:prompt}]}]})});
      const data=await resp.json();var found=data.content&&data.content.find(c=>c.type==="text");const text=found?found.text:"";
      const jsonMatch=text.match(/\{[\s\S]*\}/);if(jsonMatch){const parsed=JSON.parse(jsonMatch[0]);setResult(parsed);}else{setError("Could not parse response. Try a clearer photo.");}
    }catch(err){setError("Analysis failed. Please try again.");}
    setLoading(false);
  };
  const inp={width:"100%",padding:"9px 12px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:13,background:T.inputBg,color:T.text};
  return(
    <div style={{position:"fixed",inset:0,background:T.modalOverlay,backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}} onClick={onClose}>

        <h3 style={{margin:"0 0 4px",fontSize:18,fontFamily:"'Fraunces',serif",color:T.silverBright}}>{mode==="calories"?"📸 Snap to Track Calories":"📸 Scan Recipe from Photo"}</h3>
        <p style={{margin:"0 0 16px",fontSize:13,color:T.silverMuted}}>{mode==="calories"?"Take a photo of your food to estimate calories and macros":"Photograph a recipe page, cookbook, or screen to import it"}</p>
        <div onClick={()=>fileRef.current&&fileRef.current.click()} style={{width:"100%",height:photo?220:140,borderRadius:12,border:photo?"none":`2px dashed ${T.borderLight}`,background:photo?"none":T.surfaceAlt,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden",marginBottom:16}}>
          {photo?<img src={photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{textAlign:"center",color:T.textMuted}}><div style={{fontSize:36,marginBottom:6}}>📷</div><div style={{fontSize:13}}>Tap to take or upload a photo</div></div>}
        </div>
        <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handlePhoto} style={{display:"none"}}/>
        {photo&&!result&&(<button onClick={analyze} disabled={loading} style={{width:"100%",background:loading?T.surfaceAlt:T.gradAccent,color:loading?T.silverMuted:"#fff",border:"none",padding:"12px",borderRadius:10,fontSize:14,fontWeight:600,cursor:loading?"wait":"pointer",marginBottom:12}}>{loading?"🔄 Analyzing with AI...":"✨ Analyze with AI"}</button>)}
        {error&&<div style={{padding:12,borderRadius:8,background:T.dangerBg,color:T.danger,fontSize:13,marginBottom:12}}>{error}</div>}
        {result&&mode==="calories"&&(
          <div style={{background:T.surfaceAlt,borderRadius:12,padding:16,marginBottom:12}}>
            <div style={{fontSize:16,fontWeight:700,color:T.silverBright,marginBottom:8}}>{result.name||"Food"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div style={{textAlign:"center",padding:8,background:T.surface,borderRadius:8}}><div style={{fontSize:20,fontWeight:700,color:T.gold}}>{result.calories}</div><div style={{fontSize:10,color:T.silverMuted}}>Calories</div></div>
              <div style={{textAlign:"center",padding:8,background:T.surface,borderRadius:8}}><div style={{fontSize:20,fontWeight:700,color:T.accent1}}>{result.protein}g</div><div style={{fontSize:10,color:T.silverMuted}}>Protein</div></div>
              <div style={{textAlign:"center",padding:8,background:T.surface,borderRadius:8}}><div style={{fontSize:20,fontWeight:700,color:T.accent2}}>{result.carbs}g</div><div style={{fontSize:10,color:T.silverMuted}}>Carbs</div></div>
              <div style={{textAlign:"center",padding:8,background:T.surface,borderRadius:8}}><div style={{fontSize:20,fontWeight:700,color:T.accent3}}>{result.fat}g</div><div style={{fontSize:10,color:T.silverMuted}}>Fat</div></div>
            </div>
            {result.confidence&&<div style={{fontSize:11,color:T.silverMuted,marginTop:8,textAlign:"center"}}>Confidence: {result.confidence}</div>}
            <button onClick={()=>{onResult(result);onClose();}} style={{width:"100%",background:T.gradAccent,color:"#fff",border:"none",padding:"10px",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",marginTop:12}}>✓ Log This Meal</button>
          </div>
        )}
        {result&&mode==="recipe"&&(
          <div style={{background:T.surfaceAlt,borderRadius:12,padding:16,marginBottom:12}}>
            <div style={{fontSize:16,fontWeight:700,color:T.silverBright,marginBottom:4}}>{result.name||"Extracted Recipe"}</div>
            <div style={{fontSize:12,color:T.silverMuted,marginBottom:8}}>{result.ingredients&&result.ingredients.length||0} ingredients · {result.time||"?"}min · {result.calories||"?"} cal</div>
            {result.ingredients&&<div style={{maxHeight:150,overflowY:"auto",marginBottom:8}}>{result.ingredients.map((ing,i)=><div key={i} style={{fontSize:12,color:T.silver,padding:"3px 0"}}>{ing.amount} {ing.unit} {ing.name}</div>)}</div>}
            <button onClick={()=>{onResult(result);onClose();}} style={{width:"100%",background:T.gradAccent,color:"#fff",border:"none",padding:"10px",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>✓ Add to My Recipes</button>
          </div>
        )}
        <button onClick={onClose} style={{width:"100%",background:"none",border:`1px solid ${T.border}`,borderRadius:8,padding:"10px",fontSize:13,color:T.silverMuted,cursor:"pointer"}}>Cancel</button>
      </div>
    </div>
  );
}

// ─── MEASUREMENT CONVERTER ──────────────────────────────────────────────
function MeasurementConverter({cats,init}){
  var T=useT();
  var[amount,setAmount]=useState(init.amount);
  var[catIdx,setCatIdx]=useState(0);
  var[convIdx,setConvIdx]=useState(0);
  var[flipped,setFlipped]=useState(false);

  var cat=cats[catIdx];
  var conv=cat.conversions[convIdx];
  var fromU=flipped?conv.to:conv.from;
  var toU=flipped?conv.from:conv.to;

  function calculate(val,conversion,flip){
    var n=parseFloat(val);
    if(isNaN(n))return"";
    var f=conversion.factor;
    if(f==="special_f_to_c")return flip?((n*9/5)+32).toFixed(1):(((n-32)*5/9).toFixed(1));
    if(f==="special_c_to_f")return flip?((n-32)*5/9).toFixed(1):((n*9/5)+32).toFixed(1);
    return flip?(n/f).toFixed(4).replace(/\.?0+$/,""):(n*f).toFixed(4).replace(/\.?0+$/,"");
  }

  var result=calculate(amount,conv,flipped);
  var inp={width:"100%",padding:"12px 14px",borderRadius:10,border:"2px solid "+T.border,fontSize:18,outline:"none",background:T.inputBg,color:T.text,fontFamily:"'Manrope',sans-serif",fontWeight:600,textAlign:"center"};

  return(
    <div className="fade-up">
      <h2 style={{margin:0,fontSize:20,fontFamily:"'Fraunces',serif",color:T.silverBright}}>Measurement Converter</h2>
      <p style={{margin:"4px 0 16px",fontSize:12,color:T.silverMuted}}>Don't have the right measuring tool? Convert between units instantly.</p>

      {/* Category tabs */}
      <div style={{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap"}}>
        {cats.map(function(c,i){return(
          <button key={c.name} onClick={function(){setCatIdx(i);setConvIdx(0);setFlipped(false);}} style={{padding:"7px 14px",borderRadius:8,border:"none",background:catIdx===i?T.gradAccent:T.surface,color:catIdx===i?"#fff":T.silverMuted,fontSize:12,fontWeight:catIdx===i?600:400,cursor:"pointer",borderWidth:1,borderStyle:"solid",borderColor:catIdx===i?"transparent":T.border}}>{c.name}</button>
        );})}
      </div>

      {/* Conversion selector */}
      <div style={{background:T.surface,borderRadius:14,border:"1px solid "+T.border,padding:20,marginBottom:16}}>
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          {cat.conversions.map(function(c,i){return(
            <button key={i} onClick={function(){setConvIdx(i);setFlipped(false);}} style={{padding:"6px 12px",borderRadius:20,border:"1px solid "+(convIdx===i?T.accent1Dim:T.border),background:convIdx===i?T.accent1Bg:T.surfaceAlt,color:convIdx===i?T.accent1:T.silverMuted,fontSize:11,cursor:"pointer",fontWeight:convIdx===i?600:400}}>{c.icon} {c.from} → {c.to}</button>
          );})}
        </div>

        {/* Converter UI */}
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{flex:1}}>
            <div style={{fontSize:11,fontWeight:600,color:T.silverMuted,textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:6}}>{fromU}</div>
            <input type="number" value={amount} onChange={function(e){setAmount(e.target.value);}} style={inp}/>
          </div>

}

// ─── MAIN APP ─────────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════
function App(){
  function getInitialView(){
    var hash=window.location.hash.replace("#","");
    var valid=["pantry","suggestions","browse","upload","plan","calendar","shop","leftovers","nutrition","connect","convert","favorites"];
    return valid.indexOf(hash)!==-1?hash:"pantry";
  }
  const[theme,setThemeRaw]=useState(function(){try{return localStorage.getItem("ps_theme")||"dark";}catch(e){return "dark";}});
  function setTheme(t){setThemeRaw(t);try{localStorage.setItem("ps_theme",t);}catch(e){}}
  const[isPremium,setIsPremium]=useState(false);
  const[view,setViewRaw]=useState(getInitialView);
  function setView(v){setViewRaw(v);window.location.hash=v;}
  useEffect(function(){
    function onHash(){var h=window.location.hash.replace("#","");if(h)setViewRaw(h);}
    window.addEventListener("hashchange",onHash);
    return function(){window.removeEventListener("hashchange",onHash);};
  },[]);
  const[myIngs,setMyIngs]=useState([]);
  const[ingInput,setIngInput]=useState("");
  const[customs,setCustoms]=useState([]);
  const[selected,setSelected]=useState([]);
  const[servingOverrides,setServingOverrides]=useState({});
  const[shopCheck,setShopCheck]=useState({});
  const[showUpgrade,setShowUpgrade]=useState(false);
  const[showUpload,setShowUpload]=useState(false);
  const[connectedApps,setConnectedApps]=useState({});
  const[search,setSearch]=useState("");
  const[tagF,setTagF]=useState("all");
  const[expanded,setExpanded]=useState(null);
  const[page,setPage]=useState(1);
  const[aiScanner,setAiScanner]=useState(null);
  const[viewRecipe,setViewRecipe]=useState(null);
  const[weekMeals,setWeekMeals]=useState(function(){try{var s=localStorage.getItem("ps_week_meals");return s?JSON.parse(s):{};}catch(e){return {};}});
  const[calendarPicker,setCalendarPicker]=useState(null);
  function saveWeekMeals(m){setWeekMeals(m);try{localStorage.setItem("ps_week_meals",JSON.stringify(m));}catch(e){}}
  function addToCalendar(day,meal,recipe){var k=day+"_"+meal;var m=Object.assign({},weekMeals);m[k]=recipe;saveWeekMeals(m);}
  function removeFromCalendar(day,meal){var k=day+"_"+meal;var m=Object.assign({},weekMeals);delete m[k];saveWeekMeals(m);}
  function clearWeekCalendar(){saveWeekMeals({});}
  var calendarMealCount=Object.keys(weekMeals).length;
  const[goals,setGoals]=useState({calories:2000,protein:120,carbs:250,fat:65});
  const[editGoals,setEditGoals]=useState(false);
  const[calorieLog,setCalorieLog]=useState([]);
  const[streak,setStreak]=useState(0);
  const[bestStreak,setBestStreak]=useState(0);
  // Ratings, favorites, notes
  const[ratings,setRatings]=useState(function(){try{var s=localStorage.getItem("ps_ratings");return s?JSON.parse(s):{};}catch(e){return {};}});
  function setRating(id,v){var r=Object.assign({},ratings);r[id]=v;setRatings(r);try{localStorage.setItem("ps_ratings",JSON.stringify(r));}catch(e){}}
  const[favorites,setFavorites]=useState(function(){try{var s=localStorage.getItem("ps_favs");return s?JSON.parse(s):[];}catch(e){return [];}});
  function toggleFav(id){var f=favorites.indexOf(id)===-1?favorites.concat([id]):favorites.filter(function(x){return x!==id;});setFavorites(f);try{localStorage.setItem("ps_favs",JSON.stringify(f));}catch(e){}}
  const[recipeNotes,setRecipeNotes]=useState(function(){try{var s=localStorage.getItem("ps_notes");return s?JSON.parse(s):{};}catch(e){return {};}});
  function saveNote(id,text){var n=Object.assign({},recipeNotes);if(text)n[id]=text;else delete n[id];setRecipeNotes(n);try{localStorage.setItem("ps_notes",JSON.stringify(n));}catch(e){}}
  // Diet restrictions
  const[dietRestrictions,setDietRestrictions]=useState(function(){try{var s=localStorage.getItem("ps_diet");return s?JSON.parse(s):[];}catch(e){return [];}});
  function saveDiet(arr){setDietRestrictions(arr);try{localStorage.setItem("ps_diet",JSON.stringify(arr));}catch(e){}}
  const[showDietFilter,setShowDietFilter]=useState(false);
  // Water intake
  var today=new Date().toISOString().slice(0,10);
  const[waterLog,setWaterLog]=useState(function(){try{var s=localStorage.getItem("ps_water");return s?JSON.parse(s):{};}catch(e){return {};}});
  var todayWater=waterLog[today]||0;
  var waterGoal=8;
  function addWater(n){var w=Object.assign({},waterLog);w[today]=Math.max(0,(w[today]||0)+n);setWaterLog(w);try{localStorage.setItem("ps_water",JSON.stringify(w));}catch(e){}}
  // Leftovers
  const[leftovers,setLeftovers]=useState(function(){try{var s=localStorage.getItem("ps_leftovers");return s?JSON.parse(s):[];}catch(e){return [];}});
  function saveLeftovers(arr){setLeftovers(arr);try{localStorage.setItem("ps_leftovers",JSON.stringify(arr));}catch(e){}}
  const[showAddLeftover,setShowAddLeftover]=useState(false);
  // Timer
  const[activeTimer,setActiveTimer]=useState(null);
  const timerRef=useRef(null);
  const inpRef=useRef(null);
  useEffect(function(){
    if(!activeTimer||!activeTimer.running){if(timerRef.current)clearInterval(timerRef.current);return;}
    timerRef.current=setInterval(function(){
      setActiveTimer(function(prev){
        if(!prev||!prev.running)return prev;
        if(prev.remaining<=1){clearInterval(timerRef.current);return Object.assign({},prev,{remaining:0,running:false});}
        return Object.assign({},prev,{remaining:prev.remaining-1});
      });
    },1000);
    return function(){clearInterval(timerRef.current);};
  },[activeTimer?activeTimer.running:false,activeTimer?1:0]);

  const T=THEMES[theme];
  const premiumRecipes=useMemo(()=>genPremium(),[]);
  const allRecipes=useMemo(()=>[...FREE_RECIPES,...customs,...(isPremium?premiumRecipes:[])],[customs,isPremium,premiumRecipes]);
  const suggestions=ingInput.length>1?COMMON_INGREDIENTS.filter(i=>i.toLowerCase().includes(ingInput.toLowerCase())&&!myIngs.includes(i)).slice(0,6):[];
  const addIng=(n)=>{if(!myIngs.includes(n))setMyIngs(p=>[...p,n]);setIngInput("");inpRef.current&&inpRef.current.focus();};
  const matched=useMemo(()=>{if(!myIngs.length)return[];const ml=myIngs.map(i=>i.toLowerCase());return allRecipes.map(r=>{const t=r.ingredients.length;const m=r.ingredients.filter(ing=>ml.some(my=>ing.n.toLowerCase().includes(my)||my.includes(ing.n.toLowerCase()))).length;return{...r,matchPct:Math.round((m/t)*100)};}).filter(r=>r.matchPct>0).sort((a,b)=>b.matchPct-a.matchPct).slice(0,20);},[myIngs,allRecipes]);
  const toggle=(r)=>setSelected(p=>p.find(x=>x.id===r.id)?p.filter(x=>x.id!==r.id):[...p,r]);
  const getServings=(r)=>servingOverrides[r.id]||r.servings;
  const setServings=(id,v)=>setServingOverrides(p=>({...p,[id]:Math.max(1,v)}));
  const shopList=useMemo(()=>{const items={};selected.forEach(r=>{const sv=getServings(r);r.ingredients.forEach(ing=>{if(userHas(ing.n,myIngs))return;const k=ing.n.toLowerCase();const scaled=scaleIng(ing,r.servings,sv);if(!items[k])items[k]={...scaled,count:1};else{items[k].a+=scaled.a;items[k].count++;}});});return Object.values(items).sort((a,b)=>a.cat.localeCompare(b.cat));},[selected,myIngs,servingOverrides]);
  const shopGroups={};shopList.forEach(i=>{if(!shopGroups[i.cat])shopGroups[i.cat]=[];shopGroups[i.cat].push(i);});
  const todayLog=calorieLog.filter(l=>l.date===today);
  const todayFromLog=todayLog.reduce((a,l)=>({cal:a.cal+l.cal,protein:a.protein+l.protein,carbs:a.carbs+l.carbs,fat:a.fat+l.fat}),{cal:0,protein:0,carbs:0,fat:0});
  const todayFromPlan=selected.reduce((a,r)=>{const sv=getServings(r);const ratio=sv/r.servings;return{cal:a.cal+Math.round(r.cal*ratio),protein:a.protein+Math.round(r.protein*ratio),carbs:a.carbs+Math.round(r.carbs*ratio),fat:a.fat+Math.round(r.fat*ratio)};},{cal:0,protein:0,carbs:0,fat:0});
  const todayTotal={cal:todayFromLog.cal+todayFromPlan.cal,protein:todayFromLog.protein+todayFromPlan.protein,carbs:todayFromLog.carbs+todayFromPlan.carbs,fat:todayFromLog.fat+todayFromPlan.fat};
  const weekData=[0,0,0,0,0,0,0].map((_,i)=>i===new Date().getDay()-1?todayTotal.cal:0);
  const logMeal=(meal)=>{setCalorieLog(p=>[...p,{date:today,name:meal.name||"Meal",cal:meal.calories||0,protein:meal.protein||0,carbs:meal.carbs||0,fat:meal.fat||0}]);};
  const addAIRecipe=(data)=>{const r={id:2000+customs.length,name:data.name||"Scanned Recipe",img:"\uD83D\uDCF8",photo:null,time:data.time||15,servings:data.servings||4,cal:data.calories||300,protein:data.protein||15,carbs:data.carbs||30,fat:data.fat||12,tags:data.tags||["imported"],ingredients:(data.ingredients||[]).map(i=>({n:i.name,a:i.amount||1,u:i.unit||"pcs",cat:i.category||"Produce"})),isCustom:true};setCustoms(p=>[...p,r]);};
  const allTags=useMemo(()=>[...new Set(allRecipes.flatMap(r=>r.tags))].sort(),[allRecipes]);
  const browsable=useMemo(()=>{let r=allRecipes;if(search)r=r.filter(x=>x.name.toLowerCase().includes(search.toLowerCase()));if(tagF!=="all")r=r.filter(x=>x.tags.includes(tagF));if(dietRestrictions.length>0)r=r.filter(x=>dietRestrictions.every(function(d){return x.tags.indexOf(d)!==-1;}));return r;},[allRecipes,search,tagF,dietRestrictions]);
  const PAGE_SIZE=30;const browsablePage=browsable.slice(0,page*PAGE_SIZE);

  function shareRecipe(r,sv){
    var ratio=(sv||r.servings)/r.servings;
    var text=r.name+"\n\nServings: "+(sv||r.servings)+"\nCalories: "+Math.round(r.cal*ratio)+"\nProtein: "+Math.round(r.protein*ratio)+"g\n\nIngredients:\n"+r.ingredients.map(function(ing){var s=scaleIng(ing,r.servings,sv||r.servings);return"- "+fmtAmt(s.a,s.u)+" "+ing.n;}).join("\n")+"\n\nShared from PantrySpark";
    if(navigator.share){navigator.share({title:r.name,text:text});}else{navigator.clipboard.writeText(text).then(function(){alert("Recipe copied to clipboard!");});}

    {key:"plan",label:"Plan",icon:"\uD83D\uDCCB",badge:selected.length||null},
    {key:"calendar",label:"Week",icon:"\uD83D\uDCC5",badge:calendarMealCount||null},
    {key:"shop",label:"Shop",icon:"\uD83D\uDED2",badge:shopList.length||null},

    {key:"convert",label:"Convert",icon:"\uD83D\uDCCF"},

      <style>{"*{box-sizing:border-box}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:"+T.scrollThumb+";border-radius:3px}@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}.fade-up{animation:fadeUp 0.4s ease both}input::placeholder,select{color:"+T.textMuted+"}input:focus{border-color:"+T.accent1+" !important;outline:none}"}</style>

      {/* HEADER */}

        <div style={{maxWidth:1000,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>

              <button onClick={()=>setShowUpgrade(true)} style={{background:isPremium?T.gradPremium:"rgba(167,139,250,0.12)",border:isPremium?"none":"1px solid rgba(167,139,250,0.3)",color:"#fff",padding:"6px 12px",borderRadius:20,fontSize:10,fontWeight:600,cursor:"pointer"}}>{isPremium?"\uD83D\uDC51 Premium":"Upgrade"}</button>

                return(<div key={i} style={{background:T.surface,borderRadius:12,padding:14,border:"1px solid "+(expired||urgent?T.danger+"44":T.border),display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:44,height:44,borderRadius:10,background:statusColor+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{expired?"\u26A0\uFE0F":urgent?"\uD83D\uDD25":warning?"\u23F3":"\u2705"}</div>
                  <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:T.text}}>{item.name}</div><div style={{fontSize:11,color:T.silverMuted}}>{item.qty} {item.unit}</div></div>
                  <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:12,fontWeight:700,color:statusColor}}>{statusText}</div></div>
                  <button onClick={function(){saveLeftovers(leftovers.filter(function(_,idx){return idx!==i;}));}} style={{width:24,height:24,borderRadius:"50%",border:"1px solid "+T.danger+"44",background:"transparent",color:T.danger,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",padding:0,flexShrink:0}}>{"\u00D7"}</button>
                </div>);
              })}
            </div>)}
          </div>);
        })()}

        {/* ═══ NUTRITION ═══ */}
        {view==="nutrition"&&(<div className="fade-up">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,flexWrap:"wrap",gap:10}}>
            <div><h2 style={{margin:0,fontSize:20,fontFamily:"'Fraunces',serif",color:T.silverBright}}>Nutrition Tracker</h2></div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>setAiScanner("calories")} style={{background:T.gradAccent,color:"#fff",border:"none",padding:"8px 14px",borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer"}}>{"\uD83D\uDCF8"} Snap Meal</button>
              <button onClick={()=>setEditGoals(!editGoals)} style={{background:T.surface,border:"1px solid "+T.border,borderRadius:8,padding:"8px 14px",fontSize:11,color:T.silver,cursor:"pointer"}}>{"\u2699\uFE0F"} Goals</button>
            </div>
          </div>
          {editGoals&&(<div style={{background:T.surface,borderRadius:12,padding:16,border:"1px solid "+T.border,marginBottom:16}}><div style={{fontSize:13,fontWeight:600,color:T.silverBright,marginBottom:10}}>Daily Goals</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>{[{k:"calories",l:"Calories"},{k:"protein",l:"Protein (g)"},{k:"carbs",l:"Carbs (g)"},{k:"fat",l:"Fat (g)"}].map(g=>(<div key={g.k}><div style={{fontSize:10,color:T.silverMuted,marginBottom:3}}>{g.l}</div><input type="number" value={goals[g.k]} onChange={e=>setGoals(p=>({...p,[g.k]:parseInt(e.target.value)||0}))} style={inp}/></div>))}</div></div>)}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            <div style={{background:T.surface,borderRadius:12,padding:16,border:"1px solid "+T.border,display:"flex",flexDirection:"column",alignItems:"center"}}><DonutChart value={todayTotal.cal} max={goals.calories} size={130} strokeWidth={12} color={T.accent1} label="Calories Today" sublabel={(goals.calories-todayTotal.cal)+" remaining"}/></div>
            <div style={{background:T.surface,borderRadius:12,padding:16,border:"1px solid "+T.border}}><div style={{fontSize:13,fontWeight:600,color:T.silverBright,marginBottom:10}}>Macros</div><MacroBar label="Protein" value={todayTotal.protein} max={goals.protein} color={T.accent1}/><MacroBar label="Carbs" value={todayTotal.carbs} max={goals.carbs} color={T.accent2}/><MacroBar label="Fat" value={todayTotal.fat} max={goals.fat} color={T.accent3}/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:12,marginBottom:16}}>
            <WeeklyBarChart data={weekData} max={goals.calories} color={T.accent2} label="Weekly Calories"/>
            <StreakTracker streak={streak} best={bestStreak}/>
          </div>
          {/* Water */}
          <div style={{background:T.surface,borderRadius:12,padding:16,border:"1px solid "+T.border,marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{fontSize:13,fontWeight:600,color:T.silverBright}}>{"\uD83D\uDCA7"} Water Intake</div><span style={{fontSize:11,color:todayWater>=waterGoal?T.accent1:T.silverMuted,fontWeight:600}}>{todayWater} / {waterGoal} glasses</span></div>
            <div style={{display:"flex",gap:4,marginBottom:8}}>{[1,2,3,4,5,6,7,8].map(function(g){return(<div key={g} style={{flex:1,height:32,borderRadius:6,background:g<=todayWater?T.accent2:T.ringTrack,transition:"background 0.3s",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:g<=todayWater?"#fff":T.textMuted}}>{g<=todayWater?"\uD83D\uDCA7":g}</div>);})}</div>
            <div style={{display:"flex",gap:6}}><button onClick={function(){addWater(1);}} style={{flex:1,background:T.accent2Bg,border:"1px solid "+T.accent2Dim,borderRadius:8,padding:"8px",fontSize:12,color:T.accent2,cursor:"pointer",fontWeight:600}}>+ 1 Glass</button><button onClick={function(){addWater(2);}} style={{flex:1,background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:8,padding:"8px",fontSize:12,color:T.silverMuted,cursor:"pointer"}}>+ 2</button>{todayWater>0&&<button onClick={function(){addWater(-1);}} style={{background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:8,padding:"8px 12px",fontSize:12,color:T.silverMuted,cursor:"pointer"}}>{"\u2212"} 1</button>}</div>
            {todayWater>=waterGoal&&<div style={{textAlign:"center",marginTop:8,fontSize:12,color:T.accent1,fontWeight:600}}>{"\u2705"} Goal reached!</div>}
          </div>
          {/* Today's log */}
          <div style={{background:T.surface,borderRadius:12,padding:16,border:"1px solid "+T.border}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{fontSize:13,fontWeight:600,color:T.silverBright}}>Today's Log</div><button onClick={()=>setAiScanner("calories")} style={{background:T.accent1Bg,border:"1px solid "+T.accent1Dim,borderRadius:6,padding:"4px 10px",fontSize:11,color:T.accent1,cursor:"pointer",fontWeight:600}}>+ Log Meal</button></div>
            {todayLog.length===0&&selected.length===0?(<div style={{fontSize:12,color:T.silverMuted,textAlign:"center",padding:16}}>No meals logged today.</div>):(
              <div>{todayLog.map((l,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+T.surfaceAlt,fontSize:12}}><span style={{color:T.text}}>{l.name}</span><span style={{color:T.gold,fontWeight:600}}>{l.cal} cal</span></div>))}{selected.map(r=>(<div key={r.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+T.surfaceAlt,fontSize:12}}><span style={{color:T.text}}>{r.img} {r.name} <span style={{color:T.silverMuted}}>(plan)</span></span><span style={{color:T.gold,fontWeight:600}}>{Math.round(r.cal*(getServings(r)/r.servings))} cal</span></div>))}</div>
            )}
          </div>
        </div>)}

        {/* ═══ INTEGRATIONS ═══ */}
        {view==="connect"&&(<div className="fade-up"><h2 style={{margin:"0 0 4px",fontSize:20,fontFamily:"'Fraunces',serif",color:T.silverBright}}>Integrations</h2><p style={{margin:"0 0 20px",fontSize:12,color:T.silverMuted}}>Coming soon!</p>
          {!isPremium?(<div style={{background:T.accent3Bg,border:"1px solid "+T.accent3Dim,borderRadius:14,padding:24,textAlign:"center"}}><div style={{fontSize:32}}>{"\uD83D\uDC51"}</div><div style={{fontSize:16,fontWeight:600,color:T.accent3,marginTop:6,marginBottom:4}}>Premium Integrations</div><button onClick={()=>{setIsPremium(true);}} style={{background:T.gradPremium,color:"#fff",border:"none",padding:"10px 24px",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer"}}>Unlock {"\u2014"} $4.99</button></div>):(
          <div><div style={{background:T.surfaceAlt,borderRadius:12,padding:16,marginBottom:16,border:"1px solid "+T.border,textAlign:"center"}}><div style={{fontSize:28,marginBottom:6}}>{"\uD83D\uDE80"}</div><div style={{fontSize:14,fontWeight:600,color:T.silverBright,marginBottom:4}}>Integrations Coming Soon</div><div style={{fontSize:12,color:T.silverMuted}}>We're working on connecting PantrySpark to your favorite platforms.</div></div>
            <div style={{display:"grid",gap:12}}>{[{name:"Pinterest",icon:"\uD83D\uDCCC",desc:"Import recipe pins",color:"#e60023"},{name:"Kindle",icon:"\uD83D\uDCDA",desc:"Pull from cookbooks",color:"#ff9900"},{name:"Instagram",icon:"\uD83D\uDCF7",desc:"Save bookmarked recipes",color:"#c13584"},{name:"YouTube",icon:"\u25B6\uFE0F",desc:"Import from cooking videos",color:"#ff0000"},{name:"Allrecipes",icon:"\uD83C\uDF74",desc:"Sync favorites",color:"#e86c28"},{name:"TikTok",icon:"\uD83C\uDFB5",desc:"Import trending recipes",color:"#69C9D0"}].map(function(int){return(<div key={int.name} style={{background:T.surface,borderRadius:12,padding:16,border:"1px solid "+T.border,display:"flex",gap:14,alignItems:"center",opacity:0.75}}><div style={{width:44,height:44,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,background:int.color+"15",flexShrink:0}}>{int.icon}</div><div style={{flex:1}}><div style={{fontWeight:600,fontSize:13,color:T.text}}>{int.name}</div><div style={{fontSize:11,color:T.silverMuted,marginTop:1}}>{int.desc}</div></div><div style={{background:T.surfaceAlt,color:T.silverMuted,padding:"7px 14px",borderRadius:8,fontSize:11,fontWeight:600,border:"1px solid "+T.border}}>Coming Soon</div></div>);})}</div>
          </div>)}
        </div>)}

        {/* ═══ CONVERTER ═══ */}
        {view==="convert"&&(function(){
          var cats=[{name:"Volume",conversions:[{from:"cups",to:"tablespoons",factor:16,icon:"\uD83E\uDD64"},{from:"cups",to:"teaspoons",factor:48,icon:"\uD83E\uDD64"},{from:"cups",to:"fluid oz",factor:8,icon:"\uD83E\uDD64"},{from:"cups",to:"milliliters",factor:236.588,icon:"\uD83E\uDD64"},{from:"tablespoons",to:"teaspoons",factor:3,icon:"\uD83E\uDD44"},{from:"tablespoons",to:"milliliters",factor:14.787,icon:"\uD83E\uDD44"},{from:"fluid oz",to:"milliliters",factor:29.574,icon:"\uD83D\uDCA7"},{from:"liters",to:"cups",factor:4.227,icon:"\uD83D\uDCA7"},{from:"quarts",to:"cups",factor:4,icon:"\uD83D\uDCA7"},{from:"pints",to:"cups",factor:2,icon:"\uD83D\uDCA7"}]},{name:"Weight",conversions:[{from:"pounds",to:"ounces",factor:16,icon:"\u2696\uFE0F"},{from:"pounds",to:"grams",factor:453.592,icon:"\u2696\uFE0F"},{from:"ounces",to:"grams",factor:28.3495,icon:"\u2696\uFE0F"},{from:"kilograms",to:"pounds",factor:2.2046,icon:"\u2696\uFE0F"}]},{name:"Temperature",conversions:[{from:"\u00B0F",to:"\u00B0C",factor:"special_f_to_c",icon:"\uD83C\uDF21\uFE0F"},{from:"\u00B0C",to:"\u00B0F",factor:"special_c_to_f",icon:"\uD83C\uDF21\uFE0F"}]},{name:"Quick Ref",conversions:[{from:"stick of butter",to:"tablespoons",factor:8,icon:"\uD83E\uDDC8"},{from:"stick of butter",to:"cups",factor:0.5,icon:"\uD83E\uDDC8"},{from:"cups of flour",to:"grams",factor:120,icon:"\uD83C\uDF3E"},{from:"cups of sugar",to:"grams",factor:200,icon:"\uD83C\uDF6C"},{from:"cups of rice",to:"grams",factor:185,icon:"\uD83C\uDF5A"}]}];
          return <MeasurementConverter cats={cats} init={{amount:"1",fromUnit:"cups",toUnit:"tablespoons",result:"16",category:"Volume"}}/>;
        })()}

      </div>{/* end content area */}

      {/* ═══ MODALS ═══ */}
      {viewRecipe&&<RecipeDetailModal recipe={viewRecipe} onClose={()=>setViewRecipe(null)} onAddToPlan={(r)=>toggle(r)} onAddToCalendar={(r)=>setCalendarPicker(r)} isInPlan={!!selected.find(s=>s.id===viewRecipe.id)} myIngs={myIngs} rating={ratings[viewRecipe.id]} onRate={setRating} isFav={favorites.indexOf(viewRecipe.id)!==-1} onToggleFav={toggleFav} note={recipeNotes[viewRecipe.id]} onSaveNote={saveNote} onStartTimer={function(r){setActiveTimer({recipeName:r.name,totalSec:r.time*60,remaining:r.time*60,running:true});}} onShare={shareRecipe}/>}

      {aiScanner&&<AIPhotoScanner mode={aiScanner} onResult={aiScanner==="calories"?logMeal:addAIRecipe} onClose={()=>setAiScanner(null)}/>}

      {calendarPicker&&(function(){
        var DAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
        var MEALS=["breakfast","lunch","dinner","snack"];
        var MEAL_ICONS={breakfast:"\uD83C\uDF05",lunch:"\u2600\uFE0F",dinner:"\uD83C\uDF19",snack:"\uD83C\uDF7F"};
        var pickingRecipe=calendarPicker.day&&calendarPicker.meal;
        var pickingSlot=calendarPicker.id;
        return(
          <div style={{position:"fixed",inset:0,background:T.modalOverlay,backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}} onClick={function(){setCalendarPicker(null);}}>
            <div onClick={function(e){e.stopPropagation();}} style={{background:T.surface,borderRadius:20,padding:24,maxWidth:480,width:"100%",maxHeight:"80vh",overflowY:"auto",border:"1px solid "+T.border}}>
              {pickingSlot?(<div><h3 style={{margin:"0 0 4px",fontSize:18,fontFamily:"'Fraunces',serif",color:T.silverBright}}>{"\uD83D\uDCC5"} Add to Calendar</h3><p style={{margin:"0 0 16px",fontSize:13,color:T.silverMuted}}>Pick a day and meal for: <strong style={{color:T.text}}>{calendarPicker.name}</strong></p>
                <div style={{display:"grid",gap:8}}>{DAYS.map(function(day){return(<div key={day} style={{background:T.surfaceAlt,borderRadius:10,padding:12}}><div style={{fontSize:13,fontWeight:700,color:T.silverBright,marginBottom:8}}>{day}</div><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{MEALS.map(function(meal){var existing=weekMeals[day+"_"+meal];return(<button key={meal} onClick={function(){addToCalendar(day,meal,calendarPicker);setCalendarPicker(null);setView("calendar");}} style={{flex:1,minWidth:70,padding:"8px 6px",borderRadius:8,border:existing?"1px solid "+T.gold+"44":"1px solid "+T.border,background:existing?T.accent1Bg:T.surface,cursor:"pointer",textAlign:"center"}}><div style={{fontSize:14}}>{MEAL_ICONS[meal]}</div><div style={{fontSize:9,fontWeight:600,color:existing?T.accent1:T.silverMuted,textTransform:"capitalize"}}>{meal}</div>{existing&&<div style={{fontSize:8,color:T.silverMuted,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{existing.name}</div>}</button>);})}</div></div>);})}</div>
              </div>):(<div><h3 style={{margin:"0 0 4px",fontSize:18,fontFamily:"'Fraunces',serif",color:T.silverBright}}>{MEAL_ICONS[calendarPicker.meal]} {calendarPicker.day} {calendarPicker.meal}</h3><p style={{margin:"0 0 12px",fontSize:13,color:T.silverMuted}}>Choose a recipe</p>
                <div style={{maxHeight:"55vh",overflowY:"auto",display:"grid",gap:6}}>{allRecipes.filter(function(r){return !r.isPremiumOnly||isPremium;}).slice(0,50).map(function(r){return(<RecipePickerItem key={r.id} recipe={r} onClick={function(){addToCalendar(calendarPicker.day,calendarPicker.meal,r);setCalendarPicker(null);}}/>);})}</div>
              </div>)}
              <button onClick={function(){setCalendarPicker(null);}} style={{width:"100%",background:"none",border:"1px solid "+T.border,borderRadius:8,padding:"10px",fontSize:13,color:T.silverMuted,cursor:"pointer",marginTop:14}}>Cancel</button>
            </div>
          </div>
        );
      })()}

      {showUpgrade&&(<div style={{position:"fixed",inset:0,background:T.modalOverlay,backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}} onClick={()=>setShowUpgrade(false)}><div onClick={e=>e.stopPropagation()} style={{background:T.surface,borderRadius:18,padding:28,maxWidth:400,width:"100%",border:"1px solid "+T.border}}><div style={{textAlign:"center"}}><div style={{fontSize:42}}>{"\uD83D\uDC51"}</div><h2 style={{margin:"8px 0",fontSize:22,fontFamily:"'Fraunces',serif",color:T.silverBright}}>{isPremium?"Premium Unlocked!":"Unlock Premium"}</h2></div><div style={{display:"grid",gap:8,marginBottom:20}}>{["Ad-free forever","1,000+ premium recipes","All integrations","AI recipe scanner","Advanced nutrition","Export & share"].map(f=>(<div key={f} style={{display:"flex",gap:8,alignItems:"center",fontSize:12,color:T.silver}}><span style={{color:T.accent1,fontWeight:700}}>{"\u2713"}</span>{f}</div>))}</div>{!isPremium?(<button onClick={()=>{setIsPremium(true);setShowUpgrade(false);}} style={{width:"100%",background:T.gradPremium,color:"#fff",border:"none",padding:"12px",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>Buy Premium {"\u2014"} $4.99</button>):(<button onClick={()=>{setIsPremium(false);setShowUpgrade(false);}} style={{width:"100%",background:T.surfaceAlt,color:T.silverMuted,border:"none",padding:"12px",borderRadius:10,fontSize:12,cursor:"pointer"}}>Revert to Free</button>)}<button onClick={()=>setShowUpgrade(false)} style={{width:"100%",background:"none",border:"none",padding:"8px",fontSize:12,color:T.textMuted,cursor:"pointer",marginTop:4}}>Close</button></div></div>)}

      {/* Floating Timer */}
      {activeTimer&&(function(){
        var t=activeTimer;var mins=Math.floor(t.remaining/60);var secs=t.remaining%60;var pct=((t.totalSec-t.remaining)/t.totalSec)*100;
        return(<div style={{position:"fixed",bottom:20,right:20,background:T.surface,borderRadius:16,padding:16,border:"1px solid "+T.border,boxShadow:"0 8px 30px rgba(0,0,0,0.3)",zIndex:150,minWidth:220}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{fontSize:12,fontWeight:600,color:T.silverBright,maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{"\u23F2"} {t.recipeName}</div><button onClick={function(){clearInterval(timerRef.current);setActiveTimer(null);}} style={{width:20,height:20,borderRadius:"50%",border:"1px solid "+T.danger+"44",background:"transparent",color:T.danger,cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>{"\u00D7"}</button></div>
          <div style={{fontSize:32,fontWeight:800,color:t.remaining===0?T.accent1:T.silverBright,textAlign:"center",fontFamily:"monospace"}}>{t.remaining===0?"\u2705 Done!":String(mins).padStart(2,"0")+":"+String(secs).padStart(2,"0")}</div>
          <div style={{height:4,background:T.ringTrack,borderRadius:2,overflow:"hidden",marginTop:8,marginBottom:8}}><div style={{width:pct+"%",height:"100%",background:t.remaining===0?T.accent1:T.accent2,borderRadius:2,transition:"width 1s linear"}}/></div>
          <div style={{display:"flex",gap:6}}><button onClick={function(){setActiveTimer(Object.assign({},t,{running:!t.running}));}} style={{flex:1,background:t.running?T.gold+"22":T.accent1Bg,border:"1px solid "+(t.running?T.gold+"44":T.accent1Dim),borderRadius:8,padding:"6px",fontSize:11,color:t.running?T.gold:T.accent1,cursor:"pointer",fontWeight:600}}>{t.running?"\u23F8 Pause":"\u25B6 Resume"}</button><button onClick={function(){setActiveTimer(Object.assign({},t,{remaining:t.totalSec,running:false}));}} style={{background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:8,padding:"6px 10px",fontSize:11,color:T.silverMuted,cursor:"pointer"}}>{"\u21BA"} Reset</button></div>
        </div>);
      })()}

    </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(function(reg) {
    console.log('PantrySpark: Service Worker registered', reg.scope);
    reg.update();
    reg.addEventListener('updatefound', function() {
      var newWorker = reg.installing;
      newWorker.addEventListener('statechange', function() {
        if (newWorker.state === 'activated') {
          window.location.reload();
        }
      });
    });
  }).catch(function(err) {
    console.log('PantrySpark: SW registration failed', err);
  });
  var refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', function() {
    if (!refreshing) { refreshing = true; window.location.reload(); }
  });
}
</script>
</body>
</html>
